name: Android

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install asset generation dependencies
        run: python3 -m pip install Pillow

      - name: Regenerate watch face XML
        run: python3 tools/generate_watchface.py

      - name: Regenerate release assets
        run: python3 tools/generate_release_assets.py

      - name: Check generated XML is committed
        run: git diff --exit-code -- watchface/src/main/res/raw/watchface.xml

      - name: Check release assets exist
        run: |
          test -s watchface/src/main/res/drawable/preview.png
          test -s release-assets/icon-512.png
          test -s release-assets/screenshots/default.png
          test -s release-assets/screenshots/range-complication.png

      - name: Validate Watch Face Format
        run: java -jar tools/wff-validator.jar 2 watchface/src/main/res/raw/watchface.xml

      - name: Build debug APK
        run: ./gradlew :watchface:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: fuzzy-time-gb-debug-apk
          path: watchface/build/outputs/apk/debug/watchface-debug.apk
